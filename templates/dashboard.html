<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyIcorip - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .btn-dash {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border-radius: 1.2rem;
        }
        .btn-dash:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        .bi { font-size: 3rem !important; }
        .bg-icorip { background-color: #004a99; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark shadow-sm mb-4 bg-icorip">
    <div class="container">
        <span class="navbar-brand mb-0 h1 text-uppercase fw-bold">MyIcorip</span>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm rounded-pill">
            <i class="bi bi-box-arrow-right fs-6 me-1"></i> Esci
        </a>
    </div>
</nav>

<div class="container mt-4">
    <div class="text-center mb-5">
        <h1 class="display-6 fw-bold">Benvenuto, {{ username }}</h1>
        <p class="lead text-secondary">Seleziona un'operazione per iniziare</p>
    </div>

    <div class="row g-4 justify-content-center">
        
        <div class="col-6 col-sm-5 col-md-4">
            <a href="{{ url_for('home') }}" class="btn btn-primary btn-dash w-100 py-5 shadow-sm d-flex flex-column align-items-center border-0 bg-icorip">
                <i class="bi bi-cart-plus-fill mb-2"></i>
                <span class="fw-bold fs-5">ORDINI</span>
            </a>
        </div>

        <div class="col-6 col-sm-5 col-md-4">
            <a href="#" class="btn btn-white btn-dash w-100 py-5 shadow-sm d-flex flex-column align-items-center border bg-white text-secondary">
                <i class="bi bi-book mb-2"></i>
                <span class="fw-bold fs-5 text-dark">CATALOGO</span>
            </a>
        </div>

        <div class="col-6 col-sm-5 col-md-4">
            <a href="#" class="btn btn-white btn-dash w-100 py-5 shadow-sm d-flex flex-column align-items-center border bg-white text-secondary">
                <i class="bi bi-list-check mb-2"></i>
                <span class="fw-bold fs-5 text-dark">STATO</span>
            </a>
        </div>

        {% if username.lower() in ['andrea', 'roberto'] %}
        <div class="col-6 col-sm-5 col-md-4">
            <a href="#" class="btn btn-warning btn-dash w-100 py-5 shadow-sm d-flex flex-column align-items-center border-0 text-dark">
                <i class="bi bi-wallet2 mb-2"></i>
                <span class="fw-bold fs-5">SPESE</span>
            </a>
        </div>
        {% endif %}

    </div>
</div>

<div class="text-center mt-5 text-muted">
    <small>Versione Unificata 2025.1</small>
</div>

</body>
</html>
